name: Fetch Dhan Security IDs

on:
  schedule:
    - cron: '30 0 * * 0'
  workflow_dispatch:

jobs:
  fetch-ids:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
      DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch active FNO IDs from Dhan API
        run: python fetch_ids.py

      - name: Commit and push correct_ids.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add correct_ids.json
          git diff --staged --quiet || git commit -m "chore: update Dhan NSE_EQ security IDs [skip ci]"
          git push origin HEAD
